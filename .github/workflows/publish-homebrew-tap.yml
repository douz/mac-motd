name: Publish Homebrew Tap Formula

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true

env:
  # Bump only when updating Formula behavior/dependencies without a new upstream tag.
  FORMULA_REVISION: '1'

jobs:
  publish-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout mac-motd repository
        uses: actions/checkout@v6

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          case "${{ steps.tag.outputs.value }}" in
            v*) ;;
            *) echo "Tag must start with v"; exit 1 ;;
          esac
          if ! echo "${FORMULA_REVISION}" | grep -Eq '^[0-9]+$'; then
            echo "FORMULA_REVISION must be a non-negative integer."
            exit 1
          fi

      - name: Download source tarball
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA256="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "TARBALL_URL=$URL" >> "$GITHUB_ENV"
          echo "TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: douz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula from template
        run: |
          if [ "${FORMULA_REVISION}" -gt 0 ]; then
            REVISION_LINE="  revision ${FORMULA_REVISION}"
          else
            REVISION_LINE=""
          fi
          awk \
            -v tarball_url="${TARBALL_URL}" \
            -v tarball_sha="${TARBALL_SHA256}" \
            -v revision_line="${REVISION_LINE}" \
            '{
              gsub("__TARBALL_URL__", tarball_url)
              gsub("__TARBALL_SHA256__", tarball_sha)
              gsub("__FORMULA_REVISION_LINE__", revision_line)
              print
            }' \
            packaging/homebrew/mac-motd.rb > homebrew-tap/Formula/mac-motd.rb

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/mac-motd.rb
          if git diff --cached --quiet; then
            echo "No formula changes detected."
            exit 0
          fi
          if [ "${FORMULA_REVISION}" -gt 0 ]; then
            git commit -m "chore: update mac-motd formula for ${TAG} (revision ${FORMULA_REVISION})"
          else
            git commit -m "chore: update mac-motd formula for ${TAG}"
          fi
          git push
