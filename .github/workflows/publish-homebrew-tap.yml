name: Publish Homebrew Tap Formula

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true

jobs:
  publish-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag || '' }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          case "${{ steps.tag.outputs.value }}" in
            v*) ;;
            *) echo "Tag must start with v"; exit 1 ;;
          esac

      - name: Download source tarball
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          SHA256="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "TARBALL_URL=$URL" >> "$GITHUB_ENV"
          echo "TARBALL_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: douz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        run: |
          cat > homebrew-tap/Formula/mac-motd.rb <<FORMULA
          class MacMotd < Formula
            desc "Modular zsh MOTD for macOS"
            homepage "https://github.com/douz/mac-motd"
            url "${TARBALL_URL}"
            sha256 "${TARBALL_SHA256}"
            license "MIT"

            depends_on "figlet"
            depends_on "ical-buddy"
            depends_on "osx-cpu-temp"
            depends_on "smartmontools"

            def install
              libexec.install Dir["*"]
              bin.install_symlink libexec/"bin/mac-motd" => "mac-motd"
            end

            def caveats
              <<~EOS
                Run:
                  mac-motd install

                This creates user config at:
                  ~/.douz.io/motd_config.zsh

                To uninstall:
                  mac-motd uninstall
                or remove config too:
                  mac-motd uninstall --purge-config
              EOS
            end

            test do
              assert_match "Usage", shell_output("#{bin}/mac-motd", 1)
            end
          end
          FORMULA

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/mac-motd.rb
          if git diff --cached --quiet; then
            echo "No formula changes detected."
            exit 0
          fi
          git commit -m "chore: update mac-motd formula for ${TAG}"
          git push
