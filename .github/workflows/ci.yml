name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh shellcheck rsync

      - name: Shell syntax check
        run: |
          zsh -n motd.sh install.sh uninstall.sh bin/mac-motd modules/*.sh config/*.zsh

      - name: ShellCheck
        run: |
          shellcheck -x -e SC1071 motd.sh install.sh uninstall.sh bin/mac-motd modules/*.sh

      - name: Run tests
        run: |
          ./tests/run.sh
